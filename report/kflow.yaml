command: bash run.sh
docker_image: ghcr.io/quarto-dev/quarto:1.6.42
resources:
  cpus: 1
  memory: 2GB
  disk: 2GB
output_patterns:
- '*.html'
- '*.qmd'
- '*.svg'
- '*.txt'
- '*.csv'
name: Report
description: Reads Plot outputs and renders a Quarto-style report.
input_jobs:
- report: Plot
  latest: 1
job_config:
  required: []
  optional:
  - RUN_LABEL
  - CONFIG_NOTE
  - PLOT_COLOR
  - PLOT_TYPE
  - REPORT_TITLE
  - REPORT_TONE
  defaults:
    RUN_LABEL: demo
    CONFIG_NOTE: ''
    PLOT_COLOR: '#1f6f9f'
    PLOT_TYPE: b
    REPORT_TITLE: Analysis Report
    REPORT_TONE: short
  descriptions:
    RUN_LABEL: Short label shown in Kflow and saved outputs.
    CONFIG_NOTE: Short note saved with this run.
    PLOT_COLOR: Plot colour for the Plot step.
    PLOT_TYPE: R plot type, such as b, l, or p.
    REPORT_TITLE: Title used by the Report step.
    REPORT_TONE: 'Report style: short or detailed.'
  choices:
    PLOT_TYPE:
    - b
    - l
    - p
    REPORT_TONE:
    - short
    - detailed
tags:
  stage: report
  demo: analysis-flow
