command: bash run.sh
docker_image: ghcr.io/pacificcommunity/bet-2026:v1.9
resources:
  cpus: 1
  memory: 2GB
  disk: 2GB
output_patterns:
- '*.html'
- '*.qmd'
- '*.svg'
- '*.csv'
- '*.txt'
name: Report
description: Combines selected Plot outputs and renders one Quarto HTML report.
job_config:
  required: []
  optional:
  - RUN_LABEL
  - FLOW_GROUP
  - REPORT_TITLE
  - REPORT_TONE
  - SCENARIO_NOTE
  defaults:
    RUN_LABEL: report-a-b
    FLOW_GROUP: linear-demo
    REPORT_TITLE: Linear model sensitivity report
    REPORT_TONE: short
    SCENARIO_NOTE: Combine selected plot outputs into one report.
  descriptions:
    RUN_LABEL: Readable key used later from R.
    FLOW_GROUP: Batch label shared with the plot jobs.
    REPORT_TITLE: HTML report title.
    REPORT_TONE: short or detailed.
    SCENARIO_NOTE: Short note shown in Kflow and saved outputs.
  choices:
    REPORT_TONE:
    - short
    - detailed
tags:
  demo: analysis-flow
  stage: report
